<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Учет тренировок и параметров тела</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-block">
        <h1>Учет тренировок и параметров тела</h1>
        <p>Сайт для нескольких людей: упражнения, подходы, повторения, вес и замеры тела. Все данные сохраняются в браузере.</p>
      </div>
    </div>

    <div class="toolbar card">
      <div>
        <label for="personName">Имя человека</label>
        <input id="personName" type="text" placeholder="Например: Мурат" />
      </div>
      <div>
        <label for="personGoal">Цель</label>
        <input id="personGoal" type="text" placeholder="Например: набор массы" />
      </div>
      <button class="btn primary" id="addPersonBtn">Добавить человека</button>

    </div>

    <div class="person-panel card">
      <div class="section-head">
        <div>
          <h2>Люди</h2>
          <div class="muted">По логике как в вашем Excel: у каждого человека свой набор тренировок и свои записи.</div>
        </div>
        <div class="actions">
          <button disabled class="btn warning" id="exportBtn">Экспорт JSON</button>
          <button disabled class="btn danger" id="clearAllBtn">Очистить всё</button>
        </div>
      </div>
      <div id="personTabs" class="tabs"></div>
    </div>

    <div id="app"></div>
  </div>

  <script>
    const STORAGE_KEY = 'fitness_multiuser_tracker_v1';

    const defaultData = {
      people: [],
      activePersonId: null
    };

    let state = loadState();

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(defaultData);
      try {
        const parsed = JSON.parse(raw);
        return {
          people: Array.isArray(parsed.people) ? parsed.people : [],
          activePersonId: parsed.activePersonId || parsed.people?.[0]?.id || null
        };
      } catch {
        return structuredClone(defaultData);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getActivePerson() {
      return state.people.find(p => p.id === state.activePersonId) || null;
    }

    function setActivePerson(id) {
      state.activePersonId = id;
      saveState();
      render();
    }

    function addPerson(name, goal) {
      const person = {
        id: uid(),
        name,
        goal,
        createdAt: new Date().toISOString(),
        workouts: [],
        measurements: []
      };
      state.people.push(person);
      state.activePersonId = person.id;
      saveState();
      render();
    }

    function deletePerson(id) {
      const person = state.people.find(p => p.id === id);
      if (!person) return;
      if (!confirm(`Удалить ${person.name} со всеми тренировками и замерами?`)) return;
      state.people = state.people.filter(p => p.id !== id);
      state.activePersonId = state.people[0]?.id || null;
      saveState();
      render();
    }

    function addWorkout(personId, workout) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.workouts.unshift({ id: uid(), ...workout });
      saveState();
      render();
    }

    function deleteWorkout(personId, workoutId) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.workouts = person.workouts.filter(w => w.id !== workoutId);
      saveState();
      render();
    }

    function addMeasurement(personId, measurement) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.measurements.unshift({ id: uid(), ...measurement });
      saveState();
      render();
    }

    function deleteMeasurement(personId, measurementId) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.measurements = person.measurements.filter(m => m.id !== measurementId);
      saveState();
      render();
    }

    function getStats(person) {
      const workouts = person.workouts || [];
      const measurements = person.measurements || [];
      const latestWeight = measurements[0]?.weight || '—';
      const exerciseCount = workouts.length;
      const totalSets = workouts.reduce((sum, w) => sum + (Number(w.setCount) || 0), 0);
      const lastWorkoutDate = workouts[0]?.date || '—';
      return { latestWeight, exerciseCount, totalSets, lastWorkoutDate };
    }

    function renderTabs() {
      const wrap = document.getElementById('personTabs');
      if (!state.people.length) {
        wrap.innerHTML = '<div class="empty" style="width:100%">Пока нет людей. Добавьте первого человека сверху.</div>';
        return;
      }

      wrap.innerHTML = state.people.map(person => `
        <button class="tab ${person.id === state.activePersonId ? 'active' : ''}" data-person-id="${person.id}">
          ${escapeHtml(person.name)}
          <small>${escapeHtml(person.goal || 'без цели')}</small>
        </button>
      `).join('');

      wrap.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => setActivePerson(tab.dataset.personId));
      });
    }

    function render() {
      renderTabs();
      const app = document.getElementById('app');
      const person = getActivePerson();

      if (!person) {
        app.innerHTML = '';
        return;
      }

      const stats = getStats(person);

      app.innerHTML = `
        <div class="stats">
          <div class="stat-box card"><span>Человек</span><strong>${escapeHtml(person.name)}</strong></div>
          <div class="stat-box card"><span>Последний вес</span><strong>${escapeHtml(String(stats.latestWeight))} ${stats.latestWeight !== '—' ? 'кг' : ''}</strong></div>
          <div class="stat-box card"><span>Упражнений записано</span><strong>${stats.exerciseCount}</strong></div>
          <div class="stat-box card"><span>Всего подходов</span><strong>${stats.totalSets}</strong></div>
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Добавить упражнение / тренировку</h2>
              <div class="muted">Можно записывать по одному упражнению за раз: название, вес, подходы и повторения в каждом подходе.</div>
            </div>
            <button class="btn danger" id="deletePersonBtn">Удалить человека</button>
          </div>

          <div class="grid-5">
            <div>
              <label for="workoutDate">Дата</label>
              <input id="workoutDate" type="date" />
            </div>
            <div>
              <label for="workoutTitle">Название упражнения</label>
              <input id="workoutTitle" type="text" placeholder="Например: Жим лёжа" />
            </div>
            <div>
              <label for="machineWeight">Вес в тренажере / снаряде (кг)</label>
              <input id="machineWeight" type="number" step="0.1" placeholder="Например: 80" />
            </div>
            <div>
              <label for="setCount">Количество подходов</label>
              <input id="setCount" type="number" min="1" placeholder="Например: 4" />
            </div>
            <div>
              <label for="reps">Повторения по подходам</label>
              <input id="reps" type="text" placeholder="Например: 12,10,8,8" />
            </div>
          </div>

          <div class="grid-2" style="margin-top: 12px;">
            <div>
              <label for="workoutType">Тип тренировки</label>
              <input id="workoutType" type="text" placeholder="Например: грудь / ноги / спина" />
            </div>
            <div>
              <label for="workoutNote">Заметка</label>
              <input id="workoutNote" type="text" placeholder="Например: легко пошло / добавить вес" />
            </div>
          </div>

          <div style="margin-top: 14px;">
            <button class="btn primary" id="addWorkoutBtn">Сохранить упражнение</button>
          </div>
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Параметры тела</h2>
              <div class="muted">Вес и объемы тела для отслеживания прогресса по каждому человеку.</div>
            </div>
          </div>

          <div class="grid-5">
            <div>
              <label for="measureDate">Дата замера</label>
              <input id="measureDate" type="date" />
            </div>
            <div>
              <label for="bodyWeight">Вес (кг)</label>
              <input id="bodyWeight" type="number" step="0.1" placeholder="Например: 82.5" />
            </div>
            <div>
              <label for="chest">Грудь (см)</label>
              <input id="chest" type="number" step="0.1" placeholder="Например: 102" />
            </div>
            <div>
              <label for="waist">Талия (см)</label>
              <input id="waist" type="number" step="0.1" placeholder="Например: 84" />
            </div>
            <div>
              <label for="hips">Бедра (см)</label>
              <input id="hips" type="number" step="0.1" placeholder="Например: 98" />
            </div>
          </div>

          <div class="grid-4" style="margin-top: 12px;">
            <div>
              <label for="biceps">Бицепс (см)</label>
              <input id="biceps" type="number" step="0.1" placeholder="Например: 38" />
            </div>
            <div>
              <label for="thigh">Бедро (см)</label>
              <input id="thigh" type="number" step="0.1" placeholder="Например: 61" />
            </div>
            <div>
              <label for="neck">Шея (см)</label>
              <input id="neck" type="number" step="0.1" placeholder="Например: 40" />
            </div>
            <div>
              <label for="measureNote">Комментарий</label>
              <input id="measureNote" type="text" placeholder="Например: утром натощак" />
            </div>
          </div>

          <div style="margin-top: 14px;">
            <button class="btn primary" id="addMeasurementBtn">Сохранить замер</button>
          </div>
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Таблица упражнений</h2>
              <div class="muted">Формат близкий к вашему примеру: одна запись = одно упражнение с весом и повторениями по подходам.</div>
            </div>
          </div>
          ${renderWorkoutTable(person)}
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Таблица параметров тела</h2>
              <div class="muted">Последние замеры находятся сверху.</div>
            </div>
          </div>
          ${renderMeasurementTable(person)}
          <div class="footer-note">Данные сохраняются только в этом браузере через localStorage. Чтобы перенести на другой компьютер или хостинг, используйте экспорт JSON или позже можно подключить базу данных.</div>
        </div>
      `;

      bindPersonViewEvents(person);
      setDefaultDates();
    }

    function renderWorkoutTable(person) {
      if (!person.workouts.length) return '<div class="empty">Пока нет записанных упражнений.</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Тип тренировки</th>
                <th>Упражнение</th>
                <th>Вес</th>
                <th>Подходы</th>
                <th>Повторения</th>
                <th>Заметка</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody>
              ${person.workouts.map(w => `
                <tr>
                  <td>${escapeHtml(w.date || '—')}</td>
                  <td>${escapeHtml(w.type || '—')}</td>
                  <td><strong>${escapeHtml(w.title)}</strong></td>
                  <td>${escapeHtml(String(w.machineWeight || '—'))} ${w.machineWeight ? 'кг' : ''}</td>
                  <td>${escapeHtml(String(w.setCount || '—'))}</td>
                  <td>${formatReps(w.reps)}</td>
                  <td>${escapeHtml(w.note || '—')}</td>
                  <td><button class="btn danger delete-workout-btn" data-id="${w.id}">Удалить</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderMeasurementTable(person) {
      if (!person.measurements.length) return '<div class="empty">Пока нет замеров тела.</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Вес</th>
                <th>Грудь</th>
                <th>Талия</th>
                <th>Бедра</th>
                <th>Бицепс</th>
                <th>Бедро</th>
                <th>Шея</th>
                <th>Комментарий</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody>
              ${person.measurements.map(m => `
                <tr>
                  <td>${escapeHtml(m.date || '—')}</td>
                  <td>${escapeHtml(String(m.weight || '—'))}</td>
                  <td>${escapeHtml(String(m.chest || '—'))}</td>
                  <td>${escapeHtml(String(m.waist || '—'))}</td>
                  <td>${escapeHtml(String(m.hips || '—'))}</td>
                  <td>${escapeHtml(String(m.biceps || '—'))}</td>
                  <td>${escapeHtml(String(m.thigh || '—'))}</td>
                  <td>${escapeHtml(String(m.neck || '—'))}</td>
                  <td>${escapeHtml(m.note || '—')}</td>
                  <td><button class="btn danger delete-measurement-btn" data-id="${m.id}">Удалить</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function formatReps(reps) {
      const items = String(reps || '')
        .split(',')
        .map(x => x.trim())
        .filter(Boolean);
      if (!items.length) return '—';
      return items.map((item, index) => `<span class="set-chip">${index + 1} подход: ${escapeHtml(item)}</span>`).join('');
    }

    function bindPersonViewEvents(person) {
      document.getElementById('deletePersonBtn').addEventListener('click', () => deletePerson(person.id));

      document.getElementById('addWorkoutBtn').addEventListener('click', () => {
        const date = document.getElementById('workoutDate').value;
        const title = document.getElementById('workoutTitle').value.trim();
        const machineWeight = document.getElementById('machineWeight').value;
        const setCount = document.getElementById('setCount').value;
        const reps = document.getElementById('reps').value.trim();
        const type = document.getElementById('workoutType').value.trim();
        const note = document.getElementById('workoutNote').value.trim();

        if (!title) return alert('Введите название упражнения.');
        if (!setCount) return alert('Введите количество подходов.');
        if (!reps) return alert('Введите повторения по подходам.');

        addWorkout(person.id, { date, title, machineWeight, setCount, reps, type, note });
      });

      document.getElementById('addMeasurementBtn').addEventListener('click', () => {
        const date = document.getElementById('measureDate').value;
        const weight = document.getElementById('bodyWeight').value;
        const chest = document.getElementById('chest').value;
        const waist = document.getElementById('waist').value;
        const hips = document.getElementById('hips').value;
        const biceps = document.getElementById('biceps').value;
        const thigh = document.getElementById('thigh').value;
        const neck = document.getElementById('neck').value;
        const note = document.getElementById('measureNote').value.trim();

        if (!date && !weight && !chest && !waist && !hips && !biceps && !thigh && !neck) {
          return alert('Введите хотя бы один параметр тела.');
        }

        addMeasurement(person.id, { date, weight, chest, waist, hips, biceps, thigh, neck, note });
      });

      document.querySelectorAll('.delete-workout-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteWorkout(person.id, btn.dataset.id));
      });

      document.querySelectorAll('.delete-measurement-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteMeasurement(person.id, btn.dataset.id));
      });
    }

    function setDefaultDates() {
      const today = new Date().toISOString().slice(0, 10);
      const workoutDate = document.getElementById('workoutDate');
      const measureDate = document.getElementById('measureDate');
      if (workoutDate && !workoutDate.value) workoutDate.value = today;
      if (measureDate && !measureDate.value) measureDate.value = today;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.getElementById('addPersonBtn').addEventListener('click', () => {
      const name = document.getElementById('personName').value.trim();
      const goal = document.getElementById('personGoal').value.trim();
      if (!name) return alert('Введите имя человека.');
      addPerson(name, goal);
      document.getElementById('personName').value = '';
      document.getElementById('personGoal').value = '';
    });

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (!confirm('Точно очистить все данные?')) return;
      state = structuredClone(defaultData);
      saveState();
      render();
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'fitness-data.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById('seedBtn').addEventListener('click', () => {
      state = {
        activePersonId: 'p1',
        people: [
          {
            id: 'p1',
            name: 'Мурат',
            goal: 'набор массы',
            createdAt: new Date().toISOString(),
            workouts: [
              { id: uid(), date: '2026-03-25', type: 'Грудь / спина', title: 'Жим лёжа', machineWeight: '80', setCount: '4', reps: '20,8,8,5', note: 'по таблице из Excel' },
              { id: uid(), date: '2026-03-25', type: 'Спина', title: 'Тяга вертикального блока', machineWeight: '59', setCount: '4', reps: '8,10,8,9', note: '' }
            ],
            measurements: [
              { id: uid(), date: '2026-03-25', weight: '82.5', chest: '103', waist: '84', hips: '97', biceps: '37', thigh: '60', neck: '40', note: 'утром' }
            ]
          },
          {
            id: 'p2',
            name: 'Олег',
            goal: 'сила',
            createdAt: new Date().toISOString(),
            workouts: [
              { id: uid(), date: '2026-03-25', type: 'Грудь / спина', title: 'Жим лёжа', machineWeight: '80', setCount: '4', reps: '10,6,3,3', note: '' }
            ],
            measurements: []
          }
        ]
      };
      saveState();
      render();
    });

    render();
  </script>
</body>
</html>
