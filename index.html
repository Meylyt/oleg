<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Учет тренировок и параметров тела</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #16a34a;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-block h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
    }

    .title-block p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .toolbar,
    .person-panel,
    .section {
      padding: 18px;
      margin-bottom: 18px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .tab {
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #052e16;
      font-weight: 700;
    }

    .tab small {
      display: block;
      color: inherit;
      opacity: 0.8;
      font-size: 12px;
      margin-top: 2px;
    }

    .grid-2,
    .grid-3,
    .grid-4,
    .grid-5 {
      display: grid;
      gap: 12px;
    }

    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-5 { grid-template-columns: repeat(5, 1fr); }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    textarea { min-height: 90px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn.primary {
      background: var(--accent);
      color: #052e16;
    }

    .btn.primary:hover { background: var(--accent-2); color: white; }
    .btn.secondary { background: #1e293b; color: var(--text); border: 1px solid var(--line); }
    .btn.danger { background: rgba(239, 68, 68, 0.12); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.35); }
    .btn.warning { background: rgba(245, 158, 11, 0.12); color: #fde68a; border: 1px solid rgba(245, 158, 11, 0.35); }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .stat-box span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat-box strong {
      font-size: 24px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 950px;
      background: #0b1220;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #111827;
      color: #cbd5e1;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .set-chip {
      display: inline-block;
      margin: 4px 6px 0 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: #1f2937;
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: rgba(11, 18, 32, 0.7);
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .mobile-cards {
      display: none;
      gap: 12px;
    }

    .mobile-record {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .mobile-record-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .mobile-record-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mobile-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      padding-bottom: 6px;
    }

    .mobile-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .mobile-key {
      color: var(--muted);
      font-size: 12px;
      min-width: 110px;
    }

    .mobile-value {
      text-align: right;
      font-size: 14px;
      word-break: break-word;
    }

    @media (max-width: 1100px) {
      .container { max-width: 520px; padding: 12px; }
      .header { align-items: flex-start; }
      .toolbar,
      .grid-2,
      .grid-3,
      .grid-4,
      .grid-5,
      .stats {
        grid-template-columns: 1fr;
      }
      .section,
      .toolbar,
      .person-panel {
        padding: 14px;
        margin-bottom: 14px;
      }
      .section-head {
        align-items: flex-start;
      }
      .section-head h2 {
        font-size: 20px;
      }
      .title-block h1 {
        font-size: 26px;
        line-height: 1.15;
      }
      .title-block p,
      .muted,
      th,
      td,
      input,
      select,
      textarea {
        font-size: 14px;
      }
      .btn {
        width: 100%;
        min-height: 46px;
      }
      .actions {
        width: 100%;
        flex-direction: column;
      }
      .actions .btn {
        width: 100%;
      }
      .tabs {
        display: grid;
        grid-template-columns: 1fr;
      }
      .tab {
        width: 100%;
        text-align: left;
        border-radius: 14px;
      }
      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      table {
        min-width: 780px;
      }
      th, td {
        padding: 10px;
      }
      .stat-box {
        padding: 12px;
      }
      .stat-box strong {
        font-size: 22px;
      }
      .footer-note {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        background: #0f172a;
      }
      .container {
        padding: 10px;
      }
      .card {
        border-radius: 14px;
      }
      .section,
      .toolbar,
      .person-panel {
        padding: 12px;
      }
      .title-block h1 {
        font-size: 24px;
      }
      .title-block p {
        font-size: 13px;
      }
      label {
        font-size: 12px;
      }
      input,
      select,
      textarea {
        padding: 11px 12px;
        border-radius: 10px;
      }
      .btn {
        padding: 11px 14px;
        border-radius: 10px;
        font-size: 14px;
      }
      .section-head h2 {
        font-size: 18px;
      }
      .stat-box span {
        font-size: 12px;
      }
      .stat-box strong {
        font-size: 20px;
      }
      .table-wrap {
        display: none;
      }
      .mobile-cards {
        display: grid;
      }
      .set-chip {
        font-size: 11px;
        padding: 5px 8px;
      }
      .mobile-row {
        flex-direction: column;
        gap: 4px;
      }
      .mobile-value {
        text-align: left;
      }
    }
      .toolbar,
      .grid-2,
      .grid-3,
      .grid-4,
      .grid-5,
      .stats { grid-template-columns: 1fr; }
      .section-head { align-items: flex-start; }
      .btn { width: 100%; }
      .actions .btn { width: auto; }
      .title-block h1 { font-size: 28px; }
    

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-block">
        <h1>Учет тренировок и параметров тела</h1>
        <p>Сайт для нескольких людей: упражнения, подходы, повторения, вес и замеры тела. Данные можно хранить в Firebase Firestore и открывать с разных устройств.</p>
      </div>
    </div>

    <div class="toolbar card">
      <div>
        <label for="personName">Имя человека</label>
        <input id="personName" type="text" placeholder="Например: Мурат" />
      </div>
      <div>
        <label for="personGoal">Цель</label>
        <input id="personGoal" type="text" placeholder="Например: набор массы" />
      </div>
      <button class="btn primary" id="addPersonBtn">Добавить человека</button>
      <button class="btn secondary" id="seedBtn">Заполнить примером</button>
    </div>

    <div class="person-panel card">
      <div class="section-head">
        <div>
          <h2>Люди</h2>
          <div class="muted">По логике как в вашем Excel: у каждого человека свой набор тренировок и свои записи.</div>
        </div>
        <div class="actions">
          <button class="btn warning" id="exportBtn">Экспорт JSON</button>
          <button class="btn danger" id="clearAllBtn">Очистить всё</button>
        </div>
      </div>
      <div id="personTabs" class="tabs"></div>
    </div>

    <div id="app"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      onSnapshot,
      serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

    const STORAGE_KEY = 'fitness_multiuser_tracker_backup_v1';

    // 1) Создайте проект Firebase
    // 2) Включите Cloud Firestore
    // 3) Зарегистрируйте Web App
    // 4) Вставьте сюда свой firebaseConfig из консоли Firebase
    const firebaseConfig = {
  apiKey: "AIzaSyDo1ppwWc5N2-sSwwGhJYAWssh2iga2n-c",
  authDomain: "oleg-d9f84.firebaseapp.com",
  projectId: "oleg-d9f84",
  storageBucket: "oleg-d9f84.firebasestorage.app",
  messagingSenderId: "872891430972",
  appId: "1:872891430972:web:ccbbed28296eb1713e6b39",
  measurementId: "G-LY1SFHS0R0"
};

    // Можно поменять путь документа, если захотите отдельную базу для другого зала/группы
    const FIRESTORE_COLLECTION = 'fitnessTracker';
    const FIRESTORE_DOCUMENT = 'main';

    const defaultData = {
      people: [],
      activePersonId: null
    };

    let state = loadBackupState();
    let app = null;
    let db = null;
    let stateDocRef = null;
    let firebaseReady = false;
    let isWriting = false;

    initFirebase();
    render();

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function structuredDefault() {
      return JSON.parse(JSON.stringify(defaultData));
    }

    function loadBackupState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredDefault();
      try {
        const parsed = JSON.parse(raw);
        return normalizeState(parsed);
      } catch {
        return structuredDefault();
      }
    }

    function saveBackupState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function normalizeState(input) {
      const normalized = {
        people: Array.isArray(input?.people) ? input.people : [],
        activePersonId: input?.activePersonId || null
      };

      if (!normalized.activePersonId && normalized.people.length) {
        normalized.activePersonId = normalized.people[0].id;
      }

      normalized.people = normalized.people.map(person => ({
        id: person.id || uid(),
        name: person.name || 'Без имени',
        goal: person.goal || '',
        createdAt: person.createdAt || new Date().toISOString(),
        workouts: Array.isArray(person.workouts) ? person.workouts : [],
        measurements: Array.isArray(person.measurements) ? person.measurements : []
      }));

      return normalized;
    }

    function hasFirebaseConfig() {
      return Boolean(
        firebaseConfig.apiKey &&
        firebaseConfig.apiKey !== 'PASTE_YOUR_API_KEY' &&
        firebaseConfig.projectId &&
        firebaseConfig.projectId !== 'PASTE_YOUR_PROJECT_ID' &&
        firebaseConfig.appId &&
        firebaseConfig.appId !== 'PASTE_YOUR_APP_ID'
      );
    }

    async function initFirebase() {
      if (!hasFirebaseConfig()) {
        showConfigMessage();
        return;
      }

      try {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        stateDocRef = doc(db, FIRESTORE_COLLECTION, FIRESTORE_DOCUMENT);
        firebaseReady = true;

        const snapshot = await getDoc(stateDocRef);
        if (snapshot.exists()) {
          state = normalizeState(snapshot.data());
          saveBackupState();
          render();
        } else {
          await writeStateToFirestore();
        }

        onSnapshot(stateDocRef, (docSnap) => {
          if (!docSnap.exists()) return;
          if (isWriting) return;
          state = normalizeState(docSnap.data());
          saveBackupState();
          render();
        });
      } catch (error) {
        console.error('Firebase initialization error:', error);
        alert('Не удалось подключиться к Firebase. Пока используется локальная резервная копия в браузере. Проверьте настройки firebaseConfig и Firestore Rules.');
        render();
      }
    }

    async function writeStateToFirestore() {
      saveBackupState();

      if (!firebaseReady || !stateDocRef) return;

      try {
        isWriting = true;
        await setDoc(stateDocRef, {
          ...state,
          updatedAt: serverTimestamp()
        });
      } catch (error) {
        console.error('Firestore save error:', error);
        alert('Ошибка сохранения в Firebase. Изменения остались только в резервной копии браузера.');
      } finally {
        setTimeout(() => {
          isWriting = false;
        }, 150);
      }
    }

    function persistState() {
      writeStateToFirestore();
      render();
    }

    function showConfigMessage() {
      const appRoot = document.getElementById('app');
      appRoot.innerHTML = `
        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Нужно подключить Firebase</h2>
              <div class="muted">Сайт уже готов к базе данных, осталось вставить ваш firebaseConfig.</div>
            </div>
          </div>
          <div class="empty" style="text-align:left; line-height:1.7;">
            <strong>Что сделать:</strong><br>
            1. Откройте Firebase Console.<br>
            2. Создайте проект.<br>
            3. Включите Cloud Firestore.<br>
            4. Добавьте Web App.<br>
            5. Скопируйте объект <code>firebaseConfig</code> в этот HTML-файл.<br><br>
            После этого все люди, тренировки и замеры будут храниться в базе Firestore, а не только в браузере.
          </div>
        </div>
      `;
    }

    function getActivePerson() {
      return state.people.find(p => p.id === state.activePersonId) || null;
    }

    function setActivePerson(id) {
      state.activePersonId = id;
      persistState();
    }

    function addPerson(name, goal) {
      const person = {
        id: uid(),
        name,
        goal,
        createdAt: new Date().toISOString(),
        workouts: [],
        measurements: []
      };
      state.people.push(person);
      state.activePersonId = person.id;
      persistState();
    }

    function deletePerson(id) {
      const person = state.people.find(p => p.id === id);
      if (!person) return;
      if (!confirm(`Удалить ${person.name} со всеми тренировками и замерами?`)) return;
      state.people = state.people.filter(p => p.id !== id);
      state.activePersonId = state.people[0]?.id || null;
      persistState();
    }

    function addWorkout(personId, workout) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.workouts.unshift({ id: uid(), ...workout });
      persistState();
    }

    function deleteWorkout(personId, workoutId) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.workouts = person.workouts.filter(w => w.id !== workoutId);
      persistState();
    }

    function addMeasurement(personId, measurement) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.measurements.unshift({ id: uid(), ...measurement });
      persistState();
    }

    function deleteMeasurement(personId, measurementId) {
      const person = state.people.find(p => p.id === personId);
      if (!person) return;
      person.measurements = person.measurements.filter(m => m.id !== measurementId);
      persistState();
    }

    function getStats(person) {
      const workouts = person.workouts || [];
      const measurements = person.measurements || [];
      const latestWeight = measurements[0]?.weight || '—';
      const exerciseCount = workouts.length;
      const totalSets = workouts.reduce((sum, w) => sum + (Number(w.setCount) || 0), 0);
      return { latestWeight, exerciseCount, totalSets };
    }

    function renderTabs() {
      const wrap = document.getElementById('personTabs');
      if (!state.people.length) {
        wrap.innerHTML = '<div class="empty" style="width:100%">Пока нет людей. Добавьте первого человека сверху.</div>';
        return;
      }

      wrap.innerHTML = state.people.map(person => `
        <button class="tab ${person.id === state.activePersonId ? 'active' : ''}" data-person-id="${person.id}">
          ${escapeHtml(person.name)}
          <small>${escapeHtml(person.goal || 'без цели')}</small>
        </button>
      `).join('');

      wrap.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => setActivePerson(tab.dataset.personId));
      });
    }

    function render() {
      renderTabs();
      const appRoot = document.getElementById('app');
      const person = getActivePerson();

      if (!person) {
        appRoot.innerHTML = `
          <div class="section card">
            <div class="empty">Добавьте человека, чтобы начать учет тренировок и замеров.</div>
          </div>
        `;
        return;
      }

      const stats = getStats(person);

      appRoot.innerHTML = `
        <div class="stats">
          <div class="stat-box card"><span>Человек</span><strong>${escapeHtml(person.name)}</strong></div>
          <div class="stat-box card"><span>Последний вес</span><strong>${escapeHtml(String(stats.latestWeight))} ${stats.latestWeight !== '—' ? 'кг' : ''}</strong></div>
          <div class="stat-box card"><span>Упражнений записано</span><strong>${stats.exerciseCount}</strong></div>
          <div class="stat-box card"><span>Всего подходов</span><strong>${stats.totalSets}</strong></div>
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Добавить упражнение / тренировку</h2>
              <div class="muted">Данные сохраняются в Firebase Firestore и резервно дублируются в браузере.</div>
            </div>
            <button class="btn danger" id="deletePersonBtn">Удалить человека</button>
          </div>

          <div class="grid-5">
            <div>
              <label for="workoutDate">Дата</label>
              <input id="workoutDate" type="date" />
            </div>
            <div>
              <label for="workoutTitle">Название упражнения</label>
              <input id="workoutTitle" type="text" placeholder="Например: Жим лёжа" />
            </div>
            <div>
              <label for="machineWeight">Вес в тренажере / снаряде (кг)</label>
              <input id="machineWeight" type="number" step="0.1" placeholder="Например: 80" />
            </div>
            <div>
              <label for="setCount">Количество подходов</label>
              <input id="setCount" type="number" min="1" placeholder="Например: 4" />
            </div>
            <div>
              <label for="reps">Повторения по подходам</label>
              <input id="reps" type="text" placeholder="Например: 12,10,8,8" />
            </div>
          </div>

          <div class="grid-2" style="margin-top: 12px;">
            <div>
              <label for="workoutType">Тип тренировки</label>
              <input id="workoutType" type="text" placeholder="Например: грудь / ноги / спина" />
            </div>
            <div>
              <label for="workoutNote">Заметка</label>
              <input id="workoutNote" type="text" placeholder="Например: легко пошло / добавить вес" />
            </div>
          </div>

          <div style="margin-top: 14px;">
            <button class="btn primary" id="addWorkoutBtn">Сохранить упражнение</button>
          </div>
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Параметры тела</h2>
              <div class="muted">Вес и объемы тела для отслеживания прогресса по каждому человеку.</div>
            </div>
          </div>

          <div class="grid-5">
            <div>
              <label for="measureDate">Дата замера</label>
              <input id="measureDate" type="date" />
            </div>
            <div>
              <label for="bodyWeight">Вес (кг)</label>
              <input id="bodyWeight" type="number" step="0.1" placeholder="Например: 82.5" />
            </div>
            <div>
              <label for="chest">Грудь (см)</label>
              <input id="chest" type="number" step="0.1" placeholder="Например: 102" />
            </div>
            <div>
              <label for="waist">Талия (см)</label>
              <input id="waist" type="number" step="0.1" placeholder="Например: 84" />
            </div>
            <div>
              <label for="hips">Бедра (см)</label>
              <input id="hips" type="number" step="0.1" placeholder="Например: 98" />
            </div>
          </div>

          <div class="grid-4" style="margin-top: 12px;">
            <div>
              <label for="biceps">Бицепс (см)</label>
              <input id="biceps" type="number" step="0.1" placeholder="Например: 38" />
            </div>
            <div>
              <label for="thigh">Бедро (см)</label>
              <input id="thigh" type="number" step="0.1" placeholder="Например: 61" />
            </div>
            <div>
              <label for="neck">Шея (см)</label>
              <input id="neck" type="number" step="0.1" placeholder="Например: 40" />
            </div>
            <div>
              <label for="measureNote">Комментарий</label>
              <input id="measureNote" type="text" placeholder="Например: утром натощак" />
            </div>
          </div>

          <div style="margin-top: 14px;">
            <button class="btn primary" id="addMeasurementBtn">Сохранить замер</button>
          </div>
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Таблица упражнений</h2>
              <div class="muted">Одна запись = одно упражнение с весом и повторениями по подходам.</div>
            </div>
          </div>
          ${renderWorkoutTable(person)}
        </div>

        <div class="section card">
          <div class="section-head">
            <div>
              <h2>Таблица параметров тела</h2>
              <div class="muted">Последние замеры находятся сверху.</div>
            </div>
          </div>
          ${renderMeasurementTable(person)}
          <div class="footer-note">Сейчас основной источник хранения — Cloud Firestore. Локальная копия в браузере остается только как резервная подстраховка.</div>
        </div>
      `;

      bindPersonViewEvents(person);
      setDefaultDates();
    }

    function renderWorkoutTable(person) {
      if (!person.workouts.length) return '<div class="empty">Пока нет записанных упражнений.</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Тип тренировки</th>
                <th>Упражнение</th>
                <th>Вес</th>
                <th>Подходы</th>
                <th>Повторения</th>
                <th>Заметка</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody>
              ${person.workouts.map(w => `
                <tr>
                  <td>${escapeHtml(w.date || '—')}</td>
                  <td>${escapeHtml(w.type || '—')}</td>
                  <td><strong>${escapeHtml(w.title)}</strong></td>
                  <td>${escapeHtml(String(w.machineWeight || '—'))} ${w.machineWeight ? 'кг' : ''}</td>
                  <td>${escapeHtml(String(w.setCount || '—'))}</td>
                  <td>${formatReps(w.reps)}</td>
                  <td>${escapeHtml(w.note || '—')}</td>
                  <td><button class="btn danger delete-workout-btn" data-id="${w.id}">Удалить</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="mobile-cards">
          ${person.workouts.map(w => `
            <div class="mobile-record">
              <div class="mobile-record-title">${escapeHtml(w.title)}</div>
              <div class="mobile-record-grid">
                <div class="mobile-row"><div class="mobile-key">Дата</div><div class="mobile-value">${escapeHtml(w.date || '—')}</div></div>
                <div class="mobile-row"><div class="mobile-key">Тип</div><div class="mobile-value">${escapeHtml(w.type || '—')}</div></div>
                <div class="mobile-row"><div class="mobile-key">Вес</div><div class="mobile-value">${escapeHtml(String(w.machineWeight || '—'))} ${w.machineWeight ? 'кг' : ''}</div></div>
                <div class="mobile-row"><div class="mobile-key">Подходы</div><div class="mobile-value">${escapeHtml(String(w.setCount || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Повторения</div><div class="mobile-value">${formatReps(w.reps)}</div></div>
                <div class="mobile-row"><div class="mobile-key">Заметка</div><div class="mobile-value">${escapeHtml(w.note || '—')}</div></div>
              </div>
              <button class="btn danger delete-workout-btn" data-id="${w.id}">Удалить</button>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMeasurementTable(person) {
      if (!person.measurements.length) return '<div class="empty">Пока нет замеров тела.</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Вес</th>
                <th>Грудь</th>
                <th>Талия</th>
                <th>Бедра</th>
                <th>Бицепс</th>
                <th>Бедро</th>
                <th>Шея</th>
                <th>Комментарий</th>
                <th>Действие</th>
              </tr>
            </thead>
            <tbody>
              ${person.measurements.map(m => `
                <tr>
                  <td>${escapeHtml(m.date || '—')}</td>
                  <td>${escapeHtml(String(m.weight || '—'))}</td>
                  <td>${escapeHtml(String(m.chest || '—'))}</td>
                  <td>${escapeHtml(String(m.waist || '—'))}</td>
                  <td>${escapeHtml(String(m.hips || '—'))}</td>
                  <td>${escapeHtml(String(m.biceps || '—'))}</td>
                  <td>${escapeHtml(String(m.thigh || '—'))}</td>
                  <td>${escapeHtml(String(m.neck || '—'))}</td>
                  <td>${escapeHtml(m.note || '—')}</td>
                  <td><button class="btn danger delete-measurement-btn" data-id="${m.id}">Удалить</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="mobile-cards">
          ${person.measurements.map(m => `
            <div class="mobile-record">
              <div class="mobile-record-title">Замер от ${escapeHtml(m.date || '—')}</div>
              <div class="mobile-record-grid">
                <div class="mobile-row"><div class="mobile-key">Вес</div><div class="mobile-value">${escapeHtml(String(m.weight || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Грудь</div><div class="mobile-value">${escapeHtml(String(m.chest || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Талия</div><div class="mobile-value">${escapeHtml(String(m.waist || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Бедра</div><div class="mobile-value">${escapeHtml(String(m.hips || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Бицепс</div><div class="mobile-value">${escapeHtml(String(m.biceps || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Бедро</div><div class="mobile-value">${escapeHtml(String(m.thigh || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Шея</div><div class="mobile-value">${escapeHtml(String(m.neck || '—'))}</div></div>
                <div class="mobile-row"><div class="mobile-key">Комментарий</div><div class="mobile-value">${escapeHtml(m.note || '—')}</div></div>
              </div>
              <button class="btn danger delete-measurement-btn" data-id="${m.id}">Удалить</button>
            </div>
          `).join('')}
        </div>
      `;
    }

    function formatReps(reps) {
      const items = String(reps || '')
        .split(',')
        .map(x => x.trim())
        .filter(Boolean);
      if (!items.length) return '—';
      return items.map((item, index) => `<span class="set-chip">${index + 1} подход: ${escapeHtml(item)}</span>`).join('');
    }

    function bindPersonViewEvents(person) {
      document.getElementById('deletePersonBtn').addEventListener('click', () => deletePerson(person.id));

      document.getElementById('addWorkoutBtn').addEventListener('click', () => {
        const date = document.getElementById('workoutDate').value;
        const title = document.getElementById('workoutTitle').value.trim();
        const machineWeight = document.getElementById('machineWeight').value;
        const setCount = document.getElementById('setCount').value;
        const reps = document.getElementById('reps').value.trim();
        const type = document.getElementById('workoutType').value.trim();
        const note = document.getElementById('workoutNote').value.trim();

        if (!title) return alert('Введите название упражнения.');
        if (!setCount) return alert('Введите количество подходов.');
        if (!reps) return alert('Введите повторения по подходам.');

        addWorkout(person.id, { date, title, machineWeight, setCount, reps, type, note });
      });

      document.getElementById('addMeasurementBtn').addEventListener('click', () => {
        const date = document.getElementById('measureDate').value;
        const weight = document.getElementById('bodyWeight').value;
        const chest = document.getElementById('chest').value;
        const waist = document.getElementById('waist').value;
        const hips = document.getElementById('hips').value;
        const biceps = document.getElementById('biceps').value;
        const thigh = document.getElementById('thigh').value;
        const neck = document.getElementById('neck').value;
        const note = document.getElementById('measureNote').value.trim();

        if (!date && !weight && !chest && !waist && !hips && !biceps && !thigh && !neck) {
          return alert('Введите хотя бы один параметр тела.');
        }

        addMeasurement(person.id, { date, weight, chest, waist, hips, biceps, thigh, neck, note });
      });

      document.querySelectorAll('.delete-workout-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteWorkout(person.id, btn.dataset.id));
      });

      document.querySelectorAll('.delete-measurement-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteMeasurement(person.id, btn.dataset.id));
      });
    }

    function setDefaultDates() {
      const today = new Date().toISOString().slice(0, 10);
      const workoutDate = document.getElementById('workoutDate');
      const measureDate = document.getElementById('measureDate');
      if (workoutDate && !workoutDate.value) workoutDate.value = today;
      if (measureDate && !measureDate.value) measureDate.value = today;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.getElementById('addPersonBtn').addEventListener('click', () => {
      const name = document.getElementById('personName').value.trim();
      const goal = document.getElementById('personGoal').value.trim();
      if (!name) return alert('Введите имя человека.');
      addPerson(name, goal);
      document.getElementById('personName').value = '';
      document.getElementById('personGoal').value = '';
    });

    document.getElementById('clearAllBtn').addEventListener('click', async () => {
      if (!confirm('Точно очистить все данные?')) return;
      state = structuredDefault();
      await writeStateToFirestore();
      render();
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'fitness-data.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById('seedBtn').addEventListener('click', async () => {
      state = {
        activePersonId: 'p1',
        people: [
          {
            id: 'p1',
            name: 'Мурат',
            goal: 'набор массы',
            createdAt: new Date().toISOString(),
            workouts: [
              { id: uid(), date: '2026-03-25', type: 'Грудь / спина', title: 'Жим лёжа', machineWeight: '80', setCount: '4', reps: '20,8,8,5', note: 'пример записи' },
              { id: uid(), date: '2026-03-25', type: 'Спина', title: 'Тяга вертикального блока', machineWeight: '59', setCount: '4', reps: '8,10,8,9', note: '' }
            ],
            measurements: [
              { id: uid(), date: '2026-03-25', weight: '82.5', chest: '103', waist: '84', hips: '97', biceps: '37', thigh: '60', neck: '40', note: 'утром' }
            ]
          },
          {
            id: 'p2',
            name: 'Олег',
            goal: 'сила',
            createdAt: new Date().toISOString(),
            workouts: [
              { id: uid(), date: '2026-03-25', type: 'Грудь / спина', title: 'Жим лёжа', machineWeight: '80', setCount: '4', reps: '10,6,3,3', note: '' }
            ],
            measurements: []
          }
        ]
      };
      await writeStateToFirestore();
      render();
    });
  </script>
</body>
</html>
